<!DOCTYPE html>
<html>
<head>
    <title>Create Ticket</title>

    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen flex items-center justify-center">

    <div class="bg-white p-10 rounded-3xl shadow-2xl w-full max-w-2xl">

        <h1 class="text-4xl font-bold mb-8 text-gray-800">
            Create Ticket
        </h1>

        <form method="POST" enctype="multipart/form-data">

            {% csrf_token %}

            <div class="space-y-6">

                {{ form.as_p }}

            </div>

            <div class="mt-8 flex gap-4">

                <button
                    type="submit"
                    class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-2xl transition"
                >
                    Save Changes
                </button>

                <a
                    href="{% url 'admin_dashboard' %}"
                    class="bg-gray-500 hover:bg-gray-600 text-white px-6 py-3 rounded-2xl transition"
                >
                    Back
                </a>

            </div>

        </form>

    </div>

</body>
</html>
