{% load static %}
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700;800;900&family=Montserrat:wght@400;500&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="{% static 'employee-manifest.json' %}">
    <meta name="theme-color" content="#008000">

    <title>MSR Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(ellipse 85% 75% at 50% 58%, #0a3018 0%, #041a0a 100%);
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
        }

        @keyframes bubble-rise {
            0%   { transform: translateY(0px) translateX(0px) scale(0.7); opacity: 0; }
            7%   { opacity: 0.88; transform: translateY(-18px) translateX(calc(var(--drift) * 0.07)) scale(1); }
            82%  { opacity: 0.72; }
            100% { transform: translateY(-310px) translateX(var(--drift)) scale(0.45); opacity: 0; }
        }
        @keyframes shimmer {
            from { filter: hue-rotate(0deg); }
            to   { filter: hue-rotate(360deg); }
        }
        @keyframes steam-rise {
            0%   { transform: translateY(0px) scaleX(1); opacity: 0; }
            18%  { opacity: 0.55; }
            100% { transform: translateY(-110px) scaleX(1.6); opacity: 0; }
        }
        @keyframes broth-glow {
            0%, 100% { opacity: 0.22; }
            50%      { opacity: 0.44; }
        }
        @keyframes float-chopstick {
            0%, 100% { transform: rotate(-1.5deg) translateY(0px); }
            50%      { transform: rotate(-1.5deg) translateY(-1.5px); }
        }
        @keyframes title-pulse {
            0%, 100% { text-shadow: 0 0 40px rgba(212,146,42,0.4); }
            50%      { text-shadow: 0 0 55px rgba(212,146,42,0.6); }
        }

        .left-panel{
    position:fixed;
    left:50%;
    top:46%;
    transform:translate(-50%,-50%);
    display:flex;
    flex-direction:column;
    align-items:center;
    pointer-events:none;
    z-index:0;
}

        .pho-title-top{
    font-family:'Cinzel',serif;
    font-size:62px;
    font-weight:900;
    letter-spacing:8px;
    color:#7DD98A;
    text-transform:uppercase;
    text-align:center;
    line-height:1;
    margin-bottom:-8px;

    text-shadow:
        0 0 15px rgba(125,217,138,.35),
        0 0 35px rgba(125,217,138,.2);
}

.pho-title-main{
    font-family:'Cinzel',serif;
    font-size:74px;
    font-weight:900;
    letter-spacing:3px;
    color:#E8C97A;
    text-align:center;
    line-height:1;
    animation:title-pulse 4s ease-in-out infinite;

    text-shadow:
        0 0 18px rgba(232,201,122,.4),
        0 0 40px rgba(232,201,122,.2);
}

.pho-title-sub{
    font-family:'Montserrat',sans-serif;
    font-size:14px;
    font-weight:500;
    letter-spacing:7px;
    color:#7DAA84;
    text-align:center;
    margin-top:8px;
    margin-bottom:18px;
}

        .scene {
            position: relative;
            width: 360px;
            height: 460px;
            .scene{
    margin-top:-20px;
}
        }

        .bubble {
            position: absolute;
            border-radius: 50%;
            border: 1px solid rgba(255,255,255,0.55);
            box-shadow: 0 0 8px rgba(255,255,255,0.12), inset 0 1px 4px rgba(255,255,255,0.18);
        }

        .steam {
            position: absolute;
            width: 22px;
            height: 80px;
            background: linear-gradient(to top, rgba(255,240,220,0.2), transparent);
            border-radius: 50% 50% 0 0;
            filter: blur(8px);
        }

        /* Login card */
        .right-panel {
            margin-top: 10px;
            position: relative;
            z-index: 10;
        }

        .login-card {
            width: 340px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 40px;
            border-radius: 25px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,.15);
        }

        .login-card input {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 16px;
            background: rgba(255,255,255,.15);
            color: #ffffff;
        }

        .login-card input::placeholder { color: rgba(255,255,255,0.6); }

        .login-card input:focus {
            outline: none;
            box-shadow: 0 0 0 3px rgba(212,175,55,.35);
            background: rgba(255,255,255,.2);
        }

        .login-card button {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 12px;
            background: #d4af37;
            color: white;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all .3s ease;
        }

        .login-card button:hover {
            background: #c59d22;
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0,0,0,.18);
        }

        .error-msg {
            color: #ff8a8a;
            margin-bottom: 15px;
            font-size: 13px;
        }

        @media (max-width: 600px) {
            .login-card { width: 90vw; }
            .left-panel { transform: translate(-50%, -50%) scale(0.65); }
        }
        .logo-container{
    display: flex;
    justify-content: center;
    align-items: center;
    }

    .logo-container img{
    width: 450px;      
    height: auto;
    object-fit: contain;
    }
    </style>
</head>
<body>

<!-- BACKGROUND ANIMATION -->
<div class="left-panel">
    <div class="logo-container">
    <img src="{% static 'images/aa.png' %}" alt="MyThai Pho Hoa Logo">
</div>

    <div class="scene" id="scene">
        <div class="steam" style="left:112px; bottom:178px; animation: steam-rise 2.6s ease-out 0s infinite;"></div>
        <div class="steam" style="left:155px; bottom:178px; animation: steam-rise 3.2s ease-out 1.1s infinite;"></div>
        <div class="steam" style="left:198px; bottom:178px; animation: steam-rise 2.8s ease-out 0.5s infinite;"></div>
        <div class="steam" style="left:136px; bottom:178px; animation: steam-rise 3.5s ease-out 2.2s infinite;"></div>
        <div class="steam" style="left:218px; bottom:178px; animation: steam-rise 2.5s ease-out 1.7s infinite;"></div>
        <div class="steam" style="left:170px; bottom:178px; animation: steam-rise 3.0s ease-out 0.3s infinite;"></div>

        <svg viewBox="0 0 360 305" width="360" height="305" style="position:absolute; bottom:0;">
            <defs>
                <radialGradient id="shadow-rg" cx="50%" cy="50%" r="50%">
                    <stop offset="0%" stop-color="rgba(0,0,0,0.55)" />
                    <stop offset="100%" stop-color="rgba(0,0,0,0)" />
                </radialGradient>
                <radialGradient id="broth-rg" cx="40%" cy="38%" r="62%">
                    <stop offset="0%" stop-color="#e09030" />
                    <stop offset="55%" stop-color="#c07020" />
                    <stop offset="100%" stop-color="#954e10" />
                </radialGradient>
                <radialGradient id="broth-shine-rg" cx="38%" cy="32%" r="55%">
                    <stop offset="0%" stop-color="rgba(255,220,90,0.4)" />
                    <stop offset="50%" stop-color="rgba(220,170,40,0.12)" />
                    <stop offset="100%" stop-color="rgba(0,0,0,0)" />
                </radialGradient>
                <radialGradient id="bowl-body-rg" cx="30%" cy="20%" r="70%">
                    <stop offset="0%" stop-color="#faf6ee" />
                    <stop offset="100%" stop-color="#e8e0d0" />
                </radialGradient>
                <filter id="soft-shadow" x="-10%" y="-10%" width="120%" height="130%">
                    <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="rgba(0,0,0,0.6)" />
                </filter>
            </defs>
            <ellipse cx="180" cy="296" rx="148" ry="13" fill="url(#shadow-rg)" />
            <path d="M 52 140 Q 44 258 180 284 Q 316 258 308 140 Z" fill="url(#bowl-body-rg)" filter="url(#soft-shadow)" />
            <path d="M 62 148 Q 57 245 180 272 Q 303 245 298 148" fill="rgba(0,0,0,0.06)" />
            <path d="M 62 152 Q 56 235 128 270" fill="none" stroke="rgba(255,255,255,0.65)" stroke-width="3.5" stroke-linecap="round" />
            <ellipse cx="180" cy="140" rx="128" ry="42" fill="url(#bowl-body-rg)" />
            <ellipse cx="180" cy="140" rx="128" ry="42" fill="none" stroke="#c8a055" stroke-width="5.5" />
            <ellipse cx="180" cy="140" rx="122" ry="37.5" fill="none" stroke="#3b6ba0" stroke-width="1.8" stroke-dasharray="9 6" />
            <ellipse cx="180" cy="143" rx="118" ry="34" fill="url(#broth-rg)" />
            <ellipse cx="158" cy="136" rx="65" ry="18" fill="url(#broth-shine-rg)" style="animation: broth-glow 3.8s ease-in-out infinite" />
            <path d="M 88 148 Q 118 160 152 148 Q 180 137 212 148 Q 238 157 258 146" fill="none" stroke="#f2e6c2" stroke-width="2.8" stroke-linecap="round" opacity="0.88" />
            <path d="M 95 154 Q 125 164 158 153 Q 186 143 216 153" fill="none" stroke="#ead9ae" stroke-width="2.2" stroke-linecap="round" opacity="0.76" />
            <path d="M 108 158 Q 138 168 168 158 Q 195 149 225 158" fill="none" stroke="#f2e6c2" stroke-width="1.9" stroke-linecap="round" opacity="0.7" />
            <circle cx="120" cy="144" r="3.2" fill="#e6f2d4" opacity="0.92" />
            <circle cx="204" cy="139" r="2.8" fill="#dcecc8" opacity="0.9" />
            <circle cx="168" cy="146" r="3.5" fill="#e6f2d4" opacity="0.88" />
            <circle cx="244" cy="141" r="2.5" fill="#dcecc8" opacity="0.85" />
            <circle cx="142" cy="150" r="2.2" fill="#e6f2d4" opacity="0.8" />
            <ellipse cx="160" cy="146" rx="17" ry="7.5" fill="#b85848" opacity="0.88" transform="rotate(-14, 160, 146)" />
            <ellipse cx="202" cy="148" rx="14" ry="6.5" fill="#c86050" opacity="0.82" transform="rotate(12, 202, 148)" />
            <ellipse cx="130" cy="150" rx="11" ry="5" fill="#a84840" opacity="0.78" transform="rotate(-5, 130, 150)" />
            <ellipse cx="138" cy="139" rx="9.5" ry="6" fill="#4a8a3a" opacity="0.88" transform="rotate(-28, 138, 139)" />
            <ellipse cx="224" cy="135" rx="8.5" ry="5.5" fill="#3d7830" opacity="0.85" transform="rotate(22, 224, 135)" />
            <ellipse cx="182" cy="142" rx="7.5" ry="5" fill="#4a8a3a" opacity="0.82" transform="rotate(-8, 182, 142)" />
            <circle cx="148" cy="140" r="2.2" fill="#7ec456" opacity="0.92" />
            <circle cx="196" cy="142" r="2" fill="#6ab448" opacity="0.9" />
            <circle cx="232" cy="137" r="2.2" fill="#7ec456" opacity="0.88" />
            <circle cx="112" cy="146" r="1.8" fill="#6ab448" opacity="0.85" />
            <ellipse cx="180" cy="140" rx="128" ry="42" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="2" />
            <line x1="100" y1="122" x2="308" y2="116" stroke="#7a4e2a" stroke-width="5" stroke-linecap="round" opacity="0.82" style="animation: float-chopstick 4s ease-in-out infinite" />
            <line x1="100" y1="129" x2="308" y2="123" stroke="#9a6438" stroke-width="4" stroke-linecap="round" opacity="0.75" style="animation: float-chopstick 4s ease-in-out 0.2s infinite" />
            <rect x="96" y="119" width="12" height="14" rx="2" fill="#c0392b" opacity="0.7" style="animation: float-chopstick 4s ease-in-out infinite" />
            <rect x="96" y="125" width="10" height="1.5" rx="1" fill="rgba(255,220,50,0.7)" style="animation: float-chopstick 4s ease-in-out infinite" />
        </svg>
    </div>
</div>

<!-- LOGIN CARD CENTERED ON TOP -->
<div class="right-panel">
    <div class="login-card">

        {% if error %}
        <div class="error-msg">{{ error }}</div>
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            <input type="text" name="username" placeholder="Username" required autofocus>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>
    </div>
</div>

<script>
function seeded(seed) {
    const x = Math.sin(seed * 9301 + 49297) * 233280;
    return x - Math.floor(x);
}
const scene = document.getElementById('scene');
const BROTH_FROM_BOTTOM = 168;
for (let i = 0; i < 22; i++) {
    const left     = 72 + seeded(i * 7) * 210;
    const bottom   = BROTH_FROM_BOTTOM - 6 + seeded(i * 13) * 12;
    const size     = 6 + seeded(i * 3) * 30;
    const duration = 5 + seeded(i * 11) * 5;
    const delay    = -(seeded(i * 5) * 9);
    const drift    = (seeded(i * 17) - 0.5) * 80;
    const hue      = Math.floor(seeded(i * 23) * 360);
    const b = document.createElement('div');
    b.className = 'bubble';
    b.style.cssText = `
        left:${left}px; bottom:${bottom}px;
        width:${size}px; height:${size}px;
        background:
            radial-gradient(circle at 33% 28%, rgba(255,255,255,0.95) 0%, rgba(255,255,255,0.4) 13%, transparent 34%),
            radial-gradient(circle at 68% 73%, rgba(255,255,255,0.55) 0%, transparent 22%),
            conic-gradient(from ${hue}deg at 50% 50%, hsla(300,88%,74%,0.42), hsla(220,88%,74%,0.42), hsla(160,88%,74%,0.42), hsla(80,88%,74%,0.42), hsla(20,88%,74%,0.42), hsla(300,88%,74%,0.42));
        --drift:${drift}px;
        animation: bubble-rise ${duration}s ease-out ${delay}s infinite, shimmer ${2.8 + size * 0.09}s linear ${delay}s infinite;
    `;
    scene.appendChild(b);
}
</script>
<script>
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register("{% static 'employee-sw.js' %}");
}
</script>
</body>
</html>
