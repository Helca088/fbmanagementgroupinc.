name: django-unfold-app
services:
  - name: web
    type: web
    git:
      branch: main
    build_command: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate
    ports:
      - port: 8000
        protocol: http
    env:
      - key: DJANGO_SETTINGS_MODULE
        value: ticketsystem.settings